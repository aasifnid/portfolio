<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel Check Stage Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 1200px;
            max-width: 100%;
        }

        .timeline {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 40px;
            margin-bottom: 60px;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 100px;
            left: 120px;
            right: 120px;
            height: 3px;
            background: #d0d0d0;
            z-index: 0;
        }

        .stage {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            border: 3px solid;
            font-weight: bold;
            font-size: 48px;
            color: #2d3436;
        }

        .circle.senses {
            background: #a8e6d9;
            border-color: #5fd3bc;
        }

        .circle.emotion {
            background: #b3d9f2;
            border-color: #7fc3f2;
        }

        .circle.select {
            background: #f5d0a9;
            border-color: #e8a870;
        }

        .circle.regulate {
            background: #f0b8b8;
            border-color: #e8968a;
        }

        .stage-name {
            font-size: 16px;
            font-weight: 600;
            color: #2d3436;
            margin: 10px 0 4px;
        }

        .stage-label {
            font-size: 12px;
            color: #636e72;
        }

        .total {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #2d3436;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="timeline">
            <div class="stage">
                <div class="circle senses">42s</div>
                <div class="stage-name">Senses</div>
                <div class="stage-label">(Wheel)</div>
            </div>

            <div class="stage">
                <div class="circle emotion">7s</div>
                <div class="stage-name">Emotion</div>
                <div class="stage-label">(Zone)</div>
            </div>

            <div class="stage">
                <div class="circle select">14s</div>
                <div class="stage-name">Select</div>
                <div class="stage-label">(Emotion)</div>
            </div>

            <div class="stage">
                <div class="circle regulate">2m</div>
                <div class="stage-name">Regulate</div>
                <div class="stage-label">(Strategy)</div>
            </div>
        </div>

        <div class="total">Total Feel Check Journey: 3.4 minutes</div>
    </div>
</body>
</html>
